services:
  mysql:
    image: mysql:8
    container_name: mysql-container
    restart: always
    enviroment:
      MYSQL_ROOT_PASSWORD: ''
      MYSQL_DATABASE: note
      MYSQL_USER: root
      MSQL_PASSWORD: ''
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

volumes:
  mysql-data